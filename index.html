<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OllamaClip - AI Agent Orchestration</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <div id="toast-container"></div>
    <div id="modal-container" class="hidden"></div>
    <div id="app" class="app-layout">
      
      <!-- Sidebar Navigation -->
      <aside class="sidebar glass-panel">
        <div class="sidebar-header">
          <div class="logo">
            <i class="ph-fill ph-paperclip"></i>
            <span>OllamaClip</span>
          </div>
        </div>
        
        <nav class="sidebar-nav">
          <button class="nav-item active" data-target="dashboard">
            <i class="ph ph-squares-four"></i>
            <span>Dashboard</span>
          </button>
          <button class="nav-item" data-target="projects">
            <i class="ph ph-briefcase"></i>
            <span>Projects</span>
          </button>
          <button class="nav-item" data-target="agents">
            <i class="ph ph-users"></i>
            <span>Agents</span>
          </button>
          <button class="nav-item" data-target="chat">
            <i class="ph ph-chat-teardrop-text"></i>
            <span>Inbox</span>
          </button>
          <button class="nav-item" data-target="tasks">
            <i class="ph ph-check-square-offset"></i>
            <span>Tasks</span>
          </button>
          <button class="nav-item" data-target="settings">
            <i class="ph ph-gear"></i>
            <span>Settings</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="status-indicator online">
            <span class="dot"></span>
            <span>Ollama Connected</span>
          </div>
          <div id="global-thinking" class="global-thinking">
            <i class="ph-fill ph-brain thinking-brain"></i>
            <span>AI Thinking...</span>
          </div>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content">
        <!-- Top Header -->
        <header class="top-header glass-panel">
          <h1 id="page-title">Dashboard</h1>
          <div class="header-actions" style="display:flex; align-items:center; gap:16px;">
            <button class="btn btn-primary" id="btn-new-agent">
              <i class="ph ph-plus"></i>
              New Agent
            </button>
          </div>
        </header>

        <!-- Dynamic Content Container -->
        <div id="content-container" class="content-container">
          <!-- Views will be injected here by JS -->
        </div>
      </main>

    </div>
    
    <!-- Templates for later JS injection -->
    <template id="tpl-dashboard">
      <div class="view-dashboard">
        <div class="stats-grid">
          <div class="stat-card glass-panel">
            <div class="stat-icon"><i class="ph ph-robot"></i></div>
            <div class="stat-info">
              <h3>Active Agents</h3>
              <p id="stat-active-agents">0</p>
            </div>
          </div>
          <div class="stat-card glass-panel" id="btn-show-model-manager" style="cursor: pointer;" title="Click to manage local models">
            <div class="stat-icon"><i class="ph ph-cpu"></i></div>
            <div class="stat-info">
              <h3>Available Models</h3>
              <p id="stat-local-models">Loading...</p>
            </div>
          </div>
          <div class="stat-card glass-panel">
            <div class="stat-icon"><i class="ph ph-chats"></i></div>
            <div class="stat-info">
              <h3>Total Interactions</h3>
              <p>0</p>
            </div>
          </div>
        </div>
        
        <div class="org-chart-section">
          <h2>Organizational Chart</h2>
          <div class="org-chart glass-panel" id="org-chart-container">
            <p class="empty-state">No agents configured yet. Create one to get started.</p>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-models">
      <div class="view-models" style="animation: fadeIn 0.4s ease-out forwards; padding: 16px; display: flex; justify-content: center;">
         <div class="models-container" style="width: 100%; max-width: 800px; padding: 32px; display: flex; flex-direction: column; gap: 24px;">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="btn btn-secondary" id="btn-back-dashboard" style="background: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-light);">
                    <i class="ph ph-arrow-left"></i> Back
                </button>
                <h2>Model Manager</h2>
            </div>
            
            <div class="model-manager glass-panel" style="padding: 24px; display: flex; flex-direction: column; gap: 24px;">
                <div class="pull-model-area" style="display: flex; gap: 12px; align-items: flex-end;">
                    <div class="form-group" style="flex: 1;">
                       <label for="input-pull-model">Download Model from Ollama Hub</label>
                       <input type="text" id="input-pull-model" class="setting-input" list="hub-models" placeholder="e.g. llama3.1, deepseek-r1" autocomplete="off" />
                       <datalist id="hub-models">
                           <option value="deepseek-r1"></option>
                           <option value="llama3.3"></option>
                           <option value="llama3.2"></option>
                           <option value="llama3.1"></option>
                           <option value="qwen2.5"></option>
                           <option value="qwen2.5-coder"></option>
                           <option value="phi4"></option>
                           <option value="mistral"></option>
                           <option value="mixtral"></option>
                           <option value="gemma2"></option>
                           <option value="llava"></option>
                           <option value="qwq"></option>
                           <option value="nomic-embed-text"></option>
                           <option value="mxbai-embed-large"></option>
                           <option value="tinyllama"></option>
                           <option value="starcoder2"></option>
                           <option value="codellama"></option>
                           <option value="dolphin-mixtral"></option>
                           <option value="wizardlm2"></option>
                           <option value="openthinker"></option>
                       </datalist>
                    </div>
                    <button class="btn btn-primary" id="btn-pull-model" style="height: 46px;">
                       <i class="ph ph-cloud-arrow-down"></i> Pull Model
                    </button>
                </div>
                
                <div id="pull-progress-container" style="display: none; flex-direction: column; gap: 8px;">
                   <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary);">
                      <span id="pull-status-text">Downloading...</span>
                      <span id="pull-percentage">0%</span>
                   </div>
                   <div style="height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden;">
                      <div id="pull-progress-bar" style="height: 100%; width: 0%; background: var(--accent-primary); transition: width 0.2s;"></div>
                   </div>
                </div>

                <div class="installed-models-area">
                    <h3 style="font-size: 1rem; margin-bottom: 12px; color: var(--text-secondary); border-bottom: 1px solid var(--border-light); padding-bottom: 8px;">Installed Local Models</h3>
                    <div id="local-models-list" style="display: flex; flex-direction: column; gap: 8px;">
                       <!-- Injected via JS -->
                    </div>
                </div>
            </div>
         </div>
      </div>
    </template>

    <template id="tpl-agents">
      <div class="view-agents" style="animation: fadeIn 0.4s ease-out forwards; padding: 16px; display: flex; justify-content: center;">
        <div class="agents-container" style="width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 24px;">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <h2>Agents Management</h2>
            <p class="text-muted" style="font-size: 0.9rem;">Manage and tune your AI workforce.</p>
          </div>
          
          <div class="agents-grid" id="agents-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;">
            <!-- Agents injected via JS -->
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-chat">
      <div class="view-chat">
        <div class="chat-sidebar glass-panel">
          <div class="chat-search">
             <i class="ph ph-magnifying-glass"></i>
             <input type="text" placeholder="Search agents..." />
          </div>
          <div class="agent-list" id="chat-agent-list">
             <!-- Agents will be listed here -->
          </div>
        </div>
        
        <div class="chat-window glass-panel">
          <div class="chat-header" style="justify-content: space-between; display: flex; align-items: center;">
            <div class="chat-title">
              <h3 style="display:flex; align-items:center; gap:8px;">
                <span id="current-chat-agent">Select an agent</span>
                <span id="chat-thinking-indicator" style="display:none;"><i class="ph-fill ph-brain thinking-brain" style="font-size:1.1rem;"></i></span>
              </h3>
              <span class="model-badge" id="current-chat-model"></span>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="chat-context-flag" style="display: flex; align-items: center; gap: 6px; font-size: 0.8rem; background: rgba(99, 102, 241, 0.15); color: #818cf8; padding: 4px 10px; border-radius: 12px; border: 1px solid rgba(99, 102, 241, 0.3);">
                <i class="ph-fill ph-folder"></i>
                <span id="current-chat-project-flag">Global Context</span>
              </div>
              <button class="btn btn-secondary btn-sm" id="btn-clear-chat" title="Clear conversation history" style="padding: 4px 10px; font-size: 0.75rem;">
                <i class="ph ph-trash"></i>
              </button>
            </div>
          </div>
          
          <div class="chat-messages" id="chat-messages">
             <div class="message system">
               <p>Welcome to your AI workspace. Select an agent to start collaborating.</p>
             </div>
          </div>
          
          <div class="chat-input-area">
            <textarea id="chat-input" placeholder="Message your agent..." rows="1"></textarea>
            <button class="btn-send" id="btn-send-msg" disabled>
              <i class="ph-fill ph-paper-plane-right"></i>
            </button>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-tasks">
      <div class="view-tasks">
        <div class="tasks-container glass-panel">
          <div class="tasks-header">
            <h2>Workflow Tasks</h2>
            <p class="text-muted">Manage your AI workforce assignments.</p>
          </div>
                    <div class="task-input-section" style="display:flex; flex-direction:column; gap:12px;">
                        <div style="display:flex; gap:12px;">
                            <input type="text" id="task-title-input" placeholder="What needs to be done?">
                            <select id="task-agent-select">
                                <option value="">Unassigned</option>
                            </select>
                            <button id="btn-add-task" class="btn btn-primary">
                                <i class="ph ph-plus"></i>
                            </button>
                        </div>
                        <textarea id="task-context-input" placeholder="Specific technical details, requirements, or instructions for this task..." style="height:60px; resize:none; border-radius:8px; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--border-light); color:var(--text-primary); font-family:var(--font-family); outline:none; transition:border-color var(--transition-fast);"></textarea>
                    </div>

          <div class="task-list-wrapper">
             <div class="task-list-header">
                <h3>Open Tasks</h3>
             </div>
             <ul class="task-list" id="open-task-list">
                <!-- Open tasks injected via JS -->
             </ul>
             
             <div class="task-list-header" style="margin-top: 24px;">
                <h3>Completed</h3>
             </div>
             <ul class="task-list completed-list" id="completed-task-list">
                <!-- Completed tasks injected via JS -->
             </ul>
          </div>
        </div>
      </div>
    </template>

    <!-- Settings Template -->
    <template id="tpl-settings">
      <div class="view-settings">
        <div class="settings-container glass-panel">
          <div class="settings-header">
            <h2>Preferences & Configuration</h2>
            <p class="text-muted">Manage your local API connection and storage.</p>
          </div>

          <div class="settings-section">
            <h3>API Connection</h3>
            <div class="form-group">
              <label for="setting-api-url">Ollama Base URL</label>
              <input type="text" id="setting-api-url" class="setting-input" value="http://localhost:11434/api" />
              <small class="text-muted">Default: http://localhost:11434/api. Change if running Ollama on a different network node or port.</small>
            </div>
            
            <div class="form-group">
              <label for="setting-keep-alive">Model Keep-Alive (VRAM Retention)</label>
              <select id="setting-keep-alive" class="setting-input">
                 <option value="0s">0s (Unload immediately)</option>
                 <option value="1m">1m (1 Minute)</option>
                 <option value="5m">5m (5 Minutes - Recommended)</option>
                 <option value="30m">30m (30 Minutes)</option>
                 <option value="-1">Infinite (Until Ollama restarts)</option>
              </select>
              <small class="text-muted">How long models stay loaded in memory (<a href="https://github.com/ollama/ollama/blob/main/docs/faq.md#how-do-i-keep-a-model-loaded-in-memory-or-make-it-unload-immediately" target="_blank" style="color:var(--accent-primary)">Docs</a>).</small>
            </div>
            
            <button class="btn btn-primary" id="btn-save-settings" style="margin-top: 12px;">
              <i class="ph ph-floppy-disk"></i> Save Configuration
            </button>
            <span id="settings-save-feedback" style="margin-left:8px; color:var(--success); opacity:0; transition:opacity 0.3s;">Saved!</span>
          </div>

          <div class="settings-section danger-zone">
            <h3>Data Management</h3>
            <p class="text-muted" style="margin-bottom: 16px;">These actions are permanent and cannot be undone. Data is cleared instantly from your browser's localStorage.</p>
            
            <div class="danger-actions">
               <button class="btn btn-warning" id="btn-clear-workspace">
                 <i class="ph ph-broom"></i> Clear Shared Workspace
               </button>
               <button class="btn btn-warning" id="btn-clear-tasks">
                 <i class="ph ph-check-square-offset"></i> Clear All Tasks
               </button>
               <button class="btn btn-danger" id="btn-delete-agents">
                 <i class="ph ph-warning"></i> Delete All Agents
               </button>
            </div>
          </div>
          
        </div>
      </div>
    </template>

    <!-- Projects Template -->
    <template id="tpl-projects">
      <div class="view-projects" style="animation: fadeIn 0.4s ease-out forwards; padding: 16px; display: flex; justify-content: center;">
        <div class="projects-container glass-panel" style="width: 100%; max-width: 900px;">
          <div class="settings-header">
            <h2>Manage Projects</h2>
            <p class="text-muted">Organize your agents and tasks into separate workspaces.</p>
          </div>
                        <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:16px;">
                            <input type="text" id="new-project-title" placeholder="Project Name (e.g. Website Redesign)">
                            <textarea id="new-project-context" placeholder="Project Context & Objectives (e.g. This project aims to migrate the legacy PHP site to Next.js using a minimalist design...)" style="height:80px; resize:none; border-radius:8px; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--border-light); color:var(--text-primary); font-family:var(--font-family); outline:none; transition:border-color var(--transition-fast);"></textarea>
                            <button class="btn btn-primary" id="btn-create-project" style="align-self: flex-end;">
                                <i class="ph ph-plus"></i> Create Project
                            </button>
                        </div>

          <div class="task-list-wrapper">
             <div class="task-list-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Your Projects</h3>
                <span class="text-muted" style="font-size:0.8rem;">Strategic Memory is auto-updated by Orchestrator-1B</span>
             </div>
             <ul class="task-list" id="projects-list-container">
                <!-- Injected via JS -->
             </ul>
          </div>
        </div>
      </div>
    </template>

    <!-- Agent Builder Modal (Global Singleton) -->
    <div class="modal-overlay" id="agent-modal-overlay">
      <div class="modal-content glass-panel">
        <div class="modal-header">
          <h2 id="modal-title">Create New Agent</h2>
          <button class="btn-close" id="btn-close-modal"><i class="ph ph-x"></i></button>
        </div>
        
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group" style="flex: 2;">
              <label for="agent-name">Agent Name</label>
              <input type="text" id="agent-name" class="setting-input" placeholder="e.g. Code Master" required />
            </div>
            <div class="form-group" style="flex: 1;">
              <label for="agent-role">Role</label>
              <input type="text" id="agent-role" class="setting-input" placeholder="e.g. Developer" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group" style="flex: 1;">
              <label for="agent-model">Local Model</label>
              <select id="agent-model" class="setting-input" required>
                <!-- Populated dynamically -->
              </select>
            </div>
            <div class="form-group" style="flex: 1;">
              <label for="agent-color">Theme Color</label>
              <select id="agent-color" class="setting-input">
                <option value="#6366f1">Indigo</option>
                <option value="#ec4899">Pink</option>
                <option value="#10b981">Emerald</option>
                <option value="#f59e0b">Amber</option>
                <option value="#8b5cf6">Purple</option>
                <option value="#14b8a6">Teal</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="agent-prompt">System Prompt (Instructions)</label>
            <textarea id="agent-prompt" class="setting-input" rows="4" placeholder="You are an expert in..." required></textarea>
          </div>

          <!-- Advanced Tuning -->
          <div class="advanced-tuning-section" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-light);">
            <h4 style="margin-bottom: 12px; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between;">
              Advanced Tuning <i class="ph ph-sliders"></i>
            </h4>
            
            <div class="form-row">
              <div class="form-group" style="flex: 1;">
                <label for="agent-temperature">
                  Temperature: <span id="temp-val">0.7</span>
                </label>
                <input type="range" id="agent-temperature" min="0" max="1" step="0.1" value="0.7" style="width: 100%; accent-color: var(--accent-primary);" />
                <small class="text-muted">Higher = more creative/random</small>
              </div>
              
              <div class="form-row" style="flex: 1; gap: 12px;">
                 <div class="form-group" style="flex: 1;">
                  <label for="agent-context">Context Size (num_ctx)</label>
                  <select id="agent-context" class="setting-input">
                    <option value="2048">2048 (Default)</option>
                    <option value="4096">4096 (Standard)</option>
                    <option value="8192">8192 (Large)</option>
                    <option value="16384">16384 (X-Large)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer" style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
          <button class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
          <button class="btn btn-primary" id="btn-save-agent">Save Agent</button>
        </div>
      </div>
    </div>

    <!-- Template for Modal -->
    <template id="tpl-modal">
        <div class="modal-overlay">
            <div class="modal-content glass">
                <h3 id="modal-title">Confirm Action</h3>
                <p id="modal-message">Are you sure?</p>
                <div class="modal-actions">
                    <button id="modal-btn-cancel" class="btn btn-secondary">Cancel</button>
                    <button id="modal-btn-confirm" class="btn btn-danger">Confirm</button>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
